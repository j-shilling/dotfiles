vendor: "j-shilling"
server: "filesystem"
version: "1.0.0"

connection:
  type: "stdio"
  command: "npx"
  args: ["-y", "@modelcontextprotocol/server-filesystem", "${HOME}"]
  timeout: 60

auth:
  type: "none"

permissions:
  allow_paths: ["${HOME}"]
  deny_paths: ["/etc", "/root", "/sys"]
  read_only: false

rate_limit:
  requests_per_minute: 120
  burst: 20
