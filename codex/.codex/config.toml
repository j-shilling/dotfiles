# Codex CLI baseline config (stowed from dotfiles).
# Machine-specific secrets and project trust levels: config.local.toml (gitignored).

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.figma.tools.use_figma]
approval_mode = "approve"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.notion.tools.notion-update-page]
approval_mode = "approve"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--browser=firefox"]

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[plugins."linear@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."network-solutions@openai-curated"]
enabled = true

[model_providers.openrouter]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
